<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blurred Image Behind Text</title>
    <style>
        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: auto;
            text-align: center;
            color: white;
        }
        .background-image {
            width: 100%;
            height: auto;
            filter: blur(8px);
            -webkit-filter: blur(8px);
        }
        .text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.5); /* Optional: Adds a semi-transparent background for better readability */
        }
    </style>
</head>
<body>

<div class="container">
    <img src="/images/hotel-marina-el-cid-spa.jpeg" alt="Background Image" class="background-image">
    <div class="text-overlay">
        <h1>Your Text Here</h1>
        <p>Additional description or content can go here.</p>
    </div>
</div>

</body>
</html>
